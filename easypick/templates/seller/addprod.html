{% extends 'seller/base.html' %}

{% block title %}Orders{% endblock %}

{% block content %}
<!-- END: Header -->
<main class="min-h-[calc(100vh-80px)] flex justify-center bg-slate-50 py-6 px-4">

<div class="w-full max-w-3xl">  <!-- controlled width -->
    <!-- HEADING -->
    <h1 class="text-2xl font-bold text-primary mb-6 text-center">
        Add Product
    </h1>

<form enctype="multipart/form-data" method="POST" class="space-y-5">
{% csrf_token %}

<!-- GENERAL INFO -->
<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
<h2 class="font-semibold text-slate-800 text-sm uppercase tracking-wider">
General Information
</h2>

<div class="space-y-4">

<input name="name" placeholder="Product Name"
class="w-full p-3 border rounded-lg bg-slate-50">

<div class="grid grid-cols-2 gap-4">
<select name="category" id="category"
class="p-3 border rounded-lg bg-slate-50">
<option value="">Category</option>
{% for cat in categories %}
<option value="{{ cat.id }}">{{ cat.category_name }}</option>
{% endfor %}
</select>

<select name="subcategory" id="subcategory"
class="p-3 border rounded-lg bg-slate-50">
<option value="">Subcategory</option>
</select>
</div>

<input name="brand" placeholder="Brand"
class="w-full p-3 border rounded-lg bg-slate-50">

<textarea name="description" rows="3"
placeholder="Description"
class="w-full p-3 border rounded-lg bg-slate-50"></textarea>

</div>

<!-- IMAGE -->
<div onclick="document.getElementById('product-image').click()"
class="border-2 border-dashed rounded-xl p-6 text-center cursor-pointer bg-slate-50">

<input id="product-image" name="images" type="file" class="hidden">

<p class="text-sm text-slate-500">Click to upload image</p>

<img id="preview" class="hidden mt-2 h-32 mx-auto rounded-lg">

</div>

</section>

<!-- INVENTORY -->
<section class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
<h2 class="text-sm font-semibold uppercase text-slate-700">Inventory</h2>

<div class="grid grid-cols-2 gap-4">

<input name="sku_code" placeholder="SKU"
class="p-3 border rounded-lg bg-slate-50">

<input name="barcode" placeholder="Barcode"
class="p-3 border rounded-lg bg-slate-50">

<input name="stock_quantity" type="number" placeholder="Stock"
class="col-span-2 p-3 border rounded-lg bg-slate-50">

</div>
</section>

<!-- PRICING -->
<section class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
<h2 class="text-sm font-semibold uppercase text-slate-700">Pricing</h2>

<div class="grid grid-cols-2 gap-4">

<input name="selling_price" placeholder="Selling Price"
class="p-3 border rounded-lg bg-slate-50">

<input name="mrp" placeholder="MRP"
class="p-3 border rounded-lg bg-slate-50">

<input name="cost_price" placeholder="Cost Price"
class="p-3 border rounded-lg bg-slate-50">

<input name="tax_percentage" placeholder="Tax %"
class="p-3 border rounded-lg bg-slate-50">

</div>
</section>

<!-- SHIPPING -->
<section class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
<h2 class="text-sm font-semibold uppercase text-slate-700">Shipping</h2>

<input name="weight" placeholder="Weight (kg)"
class="w-full p-3 border rounded-lg bg-slate-50">

<div class="grid grid-cols-3 gap-3">
<input name="length" placeholder="Length" class="p-3 border rounded-lg">
<input name="width" placeholder="Width" class="p-3 border rounded-lg">
<input name="height" placeholder="Height" class="p-3 border rounded-lg">
</div>

</section>

<!-- STATUS -->
<section class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
<h2 class="text-sm font-semibold uppercase text-slate-700">Status</h2>

<select name="status" class="w-full p-3 border rounded-lg bg-slate-50">
<option value="active">Active</option>
<option value="draft">Draft</option>
<option value="archived">Archived</option>
</select>

</section>

<!-- BUTTON -->
<button type="submit"
class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-primary/90">
Save Product
</button>

</form>

</div>

</main>
<script>
const imageInput = document.getElementById('product-image');
const preview = document.getElementById('preview');

imageInput.addEventListener('change', function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
      preview.classList.remove('hidden');
    }
    reader.readAsDataURL(file);
  }
});
</script>

<script>
document.getElementById("category").addEventListener("change", function(){

    let categoryId = this.value;

    fetch("{% url 'load_subcategories' %}?category_id=" + categoryId)
    .then(response => response.json())
    .then(data => {

        let subDropdown = document.getElementById("subcategory");

        subDropdown.innerHTML = '<option value="">Select Subcategory</option>';

        data.forEach(function(sub){
            let option = document.createElement("option");
            option.value = sub.id;
            option.textContent = sub.subcategory_name;
            subDropdown.appendChild(option);
        });

    });
});
</script>
</body></html>
{% endblock %}
