{% extends 'seller/base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<a href="{% url 'seller_profile' %}"
           class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-slate-100">

            <span class="material-symbols-outlined text-primary">
                arrow_back
            </span>

        </a>
<!-- MAIN CONTAINER (NO SCROLL) -->
<main class="h-[calc(100vh-64px)] flex items-center justify-center bg-slate-50 px-4">

<form method="POST" class="w-full max-w-md bg-white rounded-2xl shadow-md border overflow-hidden">
{% csrf_token %}

<!-- HEADER -->
<div class="p-5 text-center border-b">
    <h2 class="text-xl font-bold text-primary">Edit Seller Profile</h2>
</div>

<!-- FORM BODY -->
<div class="p-5 space-y-4">

<!-- Store Name -->
<div>
<label class="text-xs font-semibold text-slate-500">Store Name</label>
<input type="text" name="store_name" value="{{ seller.store_name }}"
class="w-full mt-1 px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary outline-none">
</div>

<!-- GST + PAN -->
<div class="grid grid-cols-2 gap-3">
<div>
<label class="text-xs font-semibold text-slate-500">GST</label>
<input type="text" name="gst_number" value="{{ seller.gst_number }}"
class="w-full mt-1 px-3 py-2.5 bg-slate-100 border rounded-lg">
</div>

<div>
<label class="text-xs font-semibold text-slate-500">PAN</label>
<input type="text" name="pan_number" value="{{ seller.pan_number }}"
class="w-full mt-1 px-3 py-2.5 bg-slate-100 border rounded-lg">
</div>
</div>

<!-- BANK + IFSC -->
<div class="grid grid-cols-2 gap-3">
<div>
<label class="text-xs font-semibold text-slate-500">Bank</label>
<input type="text" name="bank_account" value="{{ seller.bank_account_number }}"
class="w-full mt-1 px-3 py-2.5 bg-slate-100 border rounded-lg">
</div>

<div>
<label class="text-xs font-semibold text-slate-500">IFSC</label>
<input type="text" name="ifsc_code" value="{{ seller.ifsc_code }}"
class="w-full mt-1 px-3 py-2.5 bg-slate-100 border rounded-lg">
</div>
</div>

<!-- ADDRESS -->
<div>
<label class="text-xs font-semibold text-slate-500">Address</label>
<textarea name="address" rows="2"
class="w-full mt-1 px-4 py-2.5 bg-slate-100 border rounded-lg resize-none">
{{ seller.business_address }}
</textarea>
</div>

<!-- BUTTONS -->
<div class="pt-3 space-y-2">
<button type="submit"
class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:bg-primary/90 transition">
Save Changes
</button>

<a href="{% url 'seller_profile' %}"
class="block text-center text-slate-500 text-sm">
Cancel
</a>
</div>

</div>
</form>

</main>


<script>
 const menuBtn = document.getElementById("menu-btn");
const sidebar = document.getElementById("sidebar");

menuBtn.addEventListener("click", () => {
    sidebar.classList.toggle("-translate-x-full");
});
</script>

</body>
</html>

{% endblock %}
