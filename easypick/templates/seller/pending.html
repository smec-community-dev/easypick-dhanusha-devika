<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval Pending | EasyPick</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f7f7f7] min-h-screen flex flex-col">

<!-- 🔹 Navbar (Same as your pages) -->
<header class="bg-[#4b5d4f] text-white px-6 py-3 flex justify-between items-center">
    <h1 class="text-lg font-bold">EasyPick</h1>

    <div class="flex gap-4">
        <a href="{% url 'mainhome' %}" class="text-sm hover:underline">Home</a>
        <a href="{% url 'login' %}" class="text-sm hover:underline">Login</a>
    </div>
</header>

<!-- 🔹 Main Content -->
<div class="flex-1 flex items-center justify-center px-4">

    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full text-center">

        <!-- Icon -->
        <div class="mb-4">
            <div class="w-16 h-16 mx-auto flex items-center justify-center bg-yellow-100 rounded-full">
                <span class="text-3xl">⏳</span>
            </div>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold text-[#4b5d4f] mb-2">
            Approval Pending
        </h2>

        <!-- Message -->
        <p class="text-gray-600 text-sm mb-6">
            Your seller account is currently under review by our admin team.  
            You will be able to access your dashboard once approved.
        </p>

        <!-- Info Box -->
        <div class="bg-[#4b5d4f]/10 text-[#4b5d4f] text-sm p-3 rounded-lg mb-6">
            ⏱ Usually takes 24 hours
        </div>
<p>Your account status: <strong>{{ seller.status }}</strong></p>
        <!-- Buttons -->
        <div class="flex flex-col gap-3">
            <a href="{% url 'mainhome' %}" 
               class="bg-[#4b5d4f] text-white py-2 rounded hover:bg-[#3e4d41] transition">
                Go to Home
            </a>

            <a href="{% url 'login' %}" 
               class="border border-[#4b5d4f] text-[#4b5d4f] py-2 rounded hover:bg-[#4b5d4f] hover:text-white transition">
                Back to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
