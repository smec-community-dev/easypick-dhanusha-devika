<!DOCTYPE html>
{% load socialaccount %}
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyPick | Seller Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
  body {
    font-family: 'Inter', sans-serif;
  }
</style>
</head>

<body class="bg-[#e8eae6] flex flex-col min-h-screen">

<!-- 🔹 Navbar -->
<header class="bg-[#4b5d4f] text-white px-6 py-3 flex justify-between items-center">
  <h1 class="text-lg font-bold">EasyPick</h1>

  <div class="flex gap-4 items-center">
    <a href="{% url 'mainhome' %}" class="text-sm hover:underline">Home</a>

    <!-- ✅ Signup Dropdown -->
    <div class="relative">
      <button id="signupButton"
        class="bg-white/20 px-3 py-1 rounded text-sm flex items-center gap-1">
        Sign Up
      </button>

      <div id="signupDropdown" class="absolute right-0 mt-2 w-56 hidden z-50">
        <div class="bg-white text-black rounded-lg shadow-lg p-3 space-y-2">
          <a href="{% url 'customer_register' %}"
             class="block bg-[#4b5d4f] text-white p-3 rounded hover:opacity-90">
            Customer Register
          </a>

          <a href="{% url 'seller_register' %}"
             class="block bg-[#4b5d4f] text-white p-3 rounded hover:opacity-90">
            Seller Register
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- 🔹 Main Content -->
<div class="flex-1 flex items-center justify-center p-4">

  <!-- Login Card -->
  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-visible">

    <!-- Header -->
    <div class="bg-[#4b5d4f] text-white text-center py-8 rounded-t-2xl">
      <h2 class="text-3xl font-bold">Welcome Back!</h2>
    
    </div>

    <!-- Form -->
    <div class="p-10 relative">
      <form method="POST" action="{% url 'login' %}" class="space-y-6">
        {% csrf_token %}

        <!-- Username -->
        <div>
          <label class="text-sm font-medium">Username</label>
          <input type="text" name="username"
            class="w-full mt-2 px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4b5d4f] transition-shadow"
            placeholder="Enter username">
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm font-medium">Password</label>
          <input type="password" name="password"
            class="w-full mt-2 px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4b5d4f] transition-shadow"
            placeholder="Enter password">
        </div>

        <!-- Submit Button -->
        <button type="submit"
          class="w-full bg-[#4b5d4f] text-white py-3 rounded-lg hover:bg-[#3e4d41] transition font-semibold">
          Login
        </button>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <hr class="flex-grow border-t border-gray-300">
          <span class="mx-3 text-gray-400 text-sm">or</span>
          <hr class="flex-grow border-t border-gray-300">
        </div>


        <!-- Don’t have an account? -->
        <div class="relative mt-6 text-center">
          <span id="registerDropdownText" class="text-sm text-gray-700 cursor-pointer font-medium">
            Don’t have an account?
          </span>

          <!-- Inline Dropdown -->
          <div id="registerDropdownMenu" class="absolute left-1/2 transform -translate-x-1/2 mt-2 hidden bg-white border rounded-lg shadow-lg z-50 px-4 py-2 flex gap-4">
            <a href="{% url 'customer_register' %}"
               class="text-[#4b5d4f] hover:bg-[#4b5d4f] hover:text-white transition px-3 py-2 rounded">
              Customer
            </a>
            <a href="{% url 'seller_register' %}"
               class="text-[#4b5d4f] hover:bg-[#4b5d4f] hover:text-white transition px-3 py-2 rounded">
              Seller
            </a>
          </div>
        </div>

      </form>
    </div>

  </div>

</div>

<!-- 🔹 JS for Dropdowns -->
<script>
  // Navbar signup dropdown
  const signupBtn = document.getElementById('signupButton');
  const signupMenu = document.getElementById('signupDropdown');

  signupBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    signupMenu.classList.toggle('hidden');
  });

  // Register text dropdown
  const registerText = document.getElementById('registerDropdownText');
  const registerMenu = document.getElementById('registerDropdownMenu');

  registerText.addEventListener('click', (e) => {
    e.stopPropagation();
    registerMenu.classList.toggle('hidden');
  });

  // Close dropdowns when clicking outside
  window.addEventListener('click', (e) => {
    if (!signupMenu.contains(e.target) && !signupBtn.contains(e.target)) {
      signupMenu.classList.add('hidden');
    }
    if (!registerMenu.contains(e.target) && !registerText.contains(e.target)) {
      registerMenu.classList.add('hidden');
    }
  });
</script>

</body>
</html>
