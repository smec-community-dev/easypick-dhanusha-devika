<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}EasyPick Admin{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e8eae6; }
        .sidebar-item-active { background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid #a2b08a; }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#4b5d4f",
            "secondary": "#a2b08a",
            "neutral-bg": "#e8eae6",
            "background-light": "#f7f7f7",
            "background-dark": "#181a18",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
</script>
</head>
<body class="bg-neutral-bg dark:bg-background-dark text-slate-900">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-primary text-white flex flex-col shrink-0">
        <!-- Logo / Brand -->
        <div class="p-6 flex items-center gap-3">
            <div class="size-8 bg-secondary rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-primary font-bold">shopping_basket</span>
            </div>
            <h1 class="text-xl font-bold tracking-tight">EasyPick</h1>
        </div>
        <!-- Sidebar Menu -->
        <nav class="flex-1 px-3 space-y-1">
            <a class="sidebar-item-active flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium" href="{% url 'admin_dashboard' %}"> 
                <span class="material-symbols-outlined size-5">dashboard</span> Dashboard
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/10" href="#"> 
                <span class="material-symbols-outlined size-5">group</span> Users
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/10" href="{% url 'product_approvals' %}">
                <span class="material-symbols-outlined size-5">inventory_2</span> Products
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/10" href="{% url 'order_management' %}">
                <span class="material-symbols-outlined size-5">shopping_cart</span> Orders
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/10" href="{% url 'seller_management' %}">
                <span class="material-symbols-outlined size-5">monitoring</span> Seller
            </a>
          
        </nav>
        <div class="p-4 border-t border-white/10">
            <a href="{% url 'logout' %}">
                <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-white/5 rounded-lg">
                    <span class="material-symbols-outlined size-5">logout</span>
                    <span class="text-sm font-medium">Logout</span>
                </div>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        {% block header %}
        <!-- Default header (can be overridden) -->
        {% endblock %}

        <div class="p-8">
            {% block content %}
            <!-- Page-specific content goes here -->
            {% endblock %}
        </div>
    </main>
</div>

</body>
</html>
