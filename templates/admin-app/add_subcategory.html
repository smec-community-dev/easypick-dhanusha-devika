{% extends "admin-app/base.html" %}

{% block title %}Add Subcategory | EasyPick Admin{% endblock %}

{% block header %}
<header class="h-16 bg-white border-b flex items-center justify-between px-8">
    <div class="flex items-center gap-4">
        <a href="{% url 'admin_category' %}" class="flex items-center justify-center size-8 rounded-full hover:bg-gray-100 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </a>
        <h1 class="text-lg font-bold text-primary">Add New Subcategory</h1>
    </div>
</header>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-8">

    <form method="POST" enctype="multipart/form-data" 
          class="bg-white rounded-xl border shadow-lg overflow-hidden">
        
        {% csrf_token %}

        <div class="p-8 space-y-6">
            
            <div>
                <label class="text-sm font-semibold text-primary">Parent Category</label>
                <select name="category" id="id_parent_category" required
                        class="w-full mt-2 border rounded-lg p-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none bg-no-repeat bg-[right_1rem_center] bg-[length:1em_1em]"
                        style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%236b7280%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');">
                    <option value="" disabled selected>Select a parent category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if request.GET.category_id|add:0 == cat.id %}selected{% endif %}>
                            {{ cat.category_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-sm font-semibold text-primary">Subcategory Name</label>
                    <input type="text" name="subcategory_name" id="id_subcategory_name" required
                           class="w-full mt-2 border rounded-lg p-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                           placeholder="e.g. Laptops">
                </div>

                <div>
                    <label class="text-sm font-semibold text-primary">Slug</label>
                    <input type="text" name="slug" id="id_slug" required
                           class="w-full mt-2 border rounded-lg p-2.5 bg-gray-50 text-gray-500 font-mono text-sm focus:outline-none cursor-not-allowed" 
                           readonly placeholder="auto-generated-slug">
                </div>
            </div>

            <div>
                <label class="text-sm font-semibold text-primary">Description</label>
                <textarea name="subcategory_description" rows="3" required
                          class="w-full mt-2 border rounded-lg p-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                          placeholder="Briefly describe this subcategory..."></textarea>
            </div>

            <div>
                <label class="text-sm font-semibold text-primary block mb-2">Subcategory Image</label>
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center hover:border-primary/50 transition-colors">
                    <input type="file" name="subcategory_image" id="id_image" class="hidden">
                    <label for="id_image" class="cursor-pointer">
                        <span class="material-symbols-outlined text-gray-400 text-4xl">cloud_upload</span>
                        <p class="text-sm text-gray-500 mt-2">Click to upload or drag and drop</p>
                        <p class="text-xs text-gray-400 mt-1">PNG, JPG up to 2MB</p>
                    </label>
                </div>
            </div>

            <div class="pt-4 border-t">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_active" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    <span class="ml-3 text-sm font-semibold text-primary">Set as Active</span>
                </label>
            </div>

        </div>

        <div class="bg-gray-50 px-8 py-4 flex justify-end items-center gap-4">
            <a href="{% url 'admin_category' %}" class="text-sm font-bold text-gray-500 hover:text-gray-700">
                Cancel
            </a>
            <button type="submit"
                    class="bg-primary hover:bg-[#3d4c40] text-white px-8 py-2.5 rounded-lg font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">save</span>
                Save Subcategory
            </button>
        </div>

    </form>
</div>

<script>
    const nameInput = document.getElementById('id_subcategory_name');
    const slugInput = document.getElementById('id_slug');

    nameInput.addEventListener('input', function () {
        let slug = nameInput.value
            .toLowerCase()
            .trim()
            .replace(/[^\w\s-]/g, '') // Remove non-word chars
            .replace(/[\s_-]+/g, '-')  // Replace spaces/underscores with -
            .replace(/^-+|-+$/g, '');   // Trim - from ends

        slugInput.value = slug;
    });
</script>
{% endblock %}
