{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Add New Address - EasyPick</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b5d4f",
                        "accent": "#a2b08a",
                        "neutral-light": "#e8eae6",
                        "background-light": "#f7f7f7",
                        "background-dark": "#181a18",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-primary">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        
        {% include "includes/navbar.html" %}

        <main class="flex-1 max-w-[850px] mx-auto w-full px-4 py-8">
            <nav class="flex items-center gap-2 text-sm font-medium mb-6 text-primary/60">
                <a href="#" class="hover:text-primary transition-colors">Profile</a>
                <span class="material-symbols-outlined text-sm">chevron_right</span>
                <span class="text-primary">New Address</span>
            </nav>

            <div class="bg-white dark:bg-zinc-900 rounded-xl shadow-sm border border-neutral-light dark:border-zinc-800 overflow-hidden">
                <div class="px-6 py-4 border-b border-neutral-light dark:border-zinc-800 flex items-center gap-3 bg-neutral-light/10">
                    <span class="material-symbols-outlined text-accent">add_location_alt</span>
                    <h2 class="text-xl font-bold text-primary">Contact & Shipping Info</h2>
                </div>

                <form method="POST" class="p-6">
                    {% csrf_token %}
                    
                    <div class="mb-8">
                        <h3 class="text-sm font-bold text-accent uppercase tracking-widest mb-4">Receiver Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">Full Name</label>
                                <input type="text" name="full_name" value="{{address_data.full_name}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="John Doe">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">Mobile Number</label>
                                <input type="tel" name="phone_number" value="{{address_data.phone_number}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="+1 234 567 890">
                            </div>
                        </div>
                    </div>

                    <hr class="border-neutral-light mb-8">

                    <div class="mb-6">
                        <h3 class="text-sm font-bold text-accent uppercase tracking-widest mb-4">Address Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div class="md:col-span-2 flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">House No, Building, Street</label>
                                <input type="text" name="house_no" value="{{address_data.house_no}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="Flat 4B, Green Valley Apartments">
                            </div>

                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">Landmark (Optional)</label>
                                <input type="text" name="landmark" value="{{address_data.landmark}}" 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="Near City Park">
                            </div>

                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">Street</label>
                                <input type="text" name="street" value="{{address_data.street}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="thrissure">
                            </div>

                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">City</label>
                                <input type="text" name="city" value="{{address_data.city}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="Portland">
                            </div>

                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">State</label>
                                <input type="text" name="state" value="{{address_data.state}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="Oregon">
                            </div>

                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase text-primary/50">Pin Code</label>
                                <input type="text" name="zip_code" value="{{address_data.zip_code}}" required 
                                       class="form-input rounded-lg border-neutral-light bg-background-light px-4 py-2.5 focus:border-accent focus:ring-0 text-primary w-full" 
                                       placeholder="97201">
                            </div>

                            <div class="md:col-span-2 flex flex-col gap-2.5">
                                <label class="text-xs font-bold uppercase text-primary/50">Address Type</label>
                                <div class="flex gap-4">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input name="address_type" value="{{address_data.address_type}}" type="radio" name="address_type" value="home" checked class="text-primary focus:ring-accent">
                                        <span class="text-sm font-medium">Home</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input name="address_type" type="radio" name="address_type" value="{{address_data.address_type}}" value="work" class="text-primary focus:ring-accent">
                                        <span class="text-sm font-medium">Work</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input name="address_type" type="radio" name="address_type" value="{{address_data.address_type}}" value="other" class="text-primary focus:ring-accent">
                                        <span class="text-sm font-medium">Other</span>
                                    </label>
                                </div>
                            </div>

                            <div class="md:col-span-2 flex items-center gap-4 py-4 border-t border-neutral-light mt-4">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" name="is_default" class="sr-only peer">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-accent"></div>
                                </label>
                                <div>
                                    <p  class="text-sm font-bold text-primary">Set as primary address</p>
                                    <p class="text-xs text-primary/60">This address will be used by default for all orders.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-neutral-light flex flex-col-reverse md:flex-row gap-3 justify-end">
                        <button type="button" onclick="history.back()" class="text-primary/60 font-bold px-6 py-2.5 hover:text-primary transition-colors">Cancel</button>
                        <button type="submit" class="bg-primary text-white px-10 py-2.5 rounded-lg font-bold hover:bg-primary/90 transition-all shadow-md">
                            Save Address
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
