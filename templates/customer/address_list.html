<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Select Address - EasyPick</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b5d4f",
                        "accent": "#a2b08a",
                        "neutral-light": "#e8eae6",
                        "background-light": "#f7f7f7",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Focus styles for the pincode input */
        .pincode-input:focus { border-bottom-color: #4b5d4f !important; outline: none; }
    </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[450px] bg-white rounded-2xl shadow-xl border border-neutral-light overflow-hidden">
        
        <div class="p-6 pb-4">
            <h2 class="text-xl font-bold text-gray-800">Select Delivery Address</h2>
        </div>

        <div class="max-h-[400px] overflow-y-auto px-4 py-2 custom-scrollbar">
            {% for addr in address %}
            <label class="flex items-start gap-4 p-4 cursor-pointer hover:bg-gray-50 rounded-xl transition-all group border border-gray-100 mb-3 block" data-address-id="{{ addr.id }}">
                <div class="flex-shrink-0 mt-1">
                    <input type="radio" name="selected_address" value="{{ addr.id }}" class="w-5 h-5 text-primary focus:ring-primary border-gray-300 peer" id="addr{{ addr.id }}">
                </div>
                <div class="flex-1 min-w-0 peer-checked:bg-primary/5 peer-checked:rounded-xl peer-checked:border-primary peer-checked:border-2">
                    <div class="flex items-center flex-wrap gap-2 mb-1">
                        <span class="font-bold text-gray-900 text-sm">{{ addr.full_name }}</span>
                        <span class="bg-gray-100 text-[10px] font-bold px-2 py-0.5 rounded-full text-gray-600 uppercase">
                            {{ addr.address_type|capfirst|default:"Home" }}
                        </span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-2 mb-2">
                        {{ addr.house_no|default:"" }} {{ addr.street }}, {{ addr.landmark|default:"" }}, {{ addr.city }}, {{ addr.state }} {{ addr.zip_code }}
                    </p>
                    <p class="text-xs text-gray-500">{{ addr.phone_number }}</p>
                </div>
            </label>
            {% empty %}
            <div class="text-center py-12 text-gray-400">
                <span class="material-symbols-outlined text-4xl block mb-3 mx-auto">location_off</span>
                <p class="text-lg font-medium mb-2">No addresses saved</p>
                <a href="{% url 'add_address' %}" target="_top" class="inline-flex items-center gap-2 bg-primary text-white px-6 py-2.5 rounded-xl font-bold hover:bg-primary/90 transition-all">
                    <span class="material-symbols-outlined text-sm">add</span>
                    Add New Address
                </a>
            </div>
            {% endfor %}
        </div>

        <div class="p-6 pt-4 border-t border-gray-100">
            {% if address %}
            <button onclick="selectAddress()" 
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 text-sm uppercase tracking-wide">
                <span class="material-symbols-outlined">check_circle</span>
                Use selected address
            </button>
            {% else %}
            <a href="{% url 'add_address' %}" target="_top" 
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md block text-center text-sm uppercase tracking-wide">
                Add new address
            </a>
            {% endif %}
        </div>

        <script>
            function selectAddress() {
                const selected = document.querySelector('input[name=\"selected_address\"]:checked');
                if (!selected) {
                    alert('Please select an address');
                    return;
                }
                // Notify parent window
                window.parent.postMessage({
                    type: 'selectAddress',
                    addressId: selected.value
                }, '*');
            }
            
            // Auto-trigger if pre-selected
            window.addEventListener('load', () => {
                const radios = document.querySelectorAll('input[name=\"selected_address\"]');
                if (radios.length > 0) {
                    radios[0].checked = true;
                }
            });
        </script>
    </div>

</body>
</html>
