<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Contact Us | EasyPick</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,line-clamp"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#4b5d4f", "background-light": "#f7f7f7" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light text-[#141514] font-['Inter']">

    <nav class="bg-primary text-white py-4 px-6 md:px-12">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-xl font-extrabold tracking-tight">
                <span class="material-symbols-outlined">grid_view</span> EasyPick
            </a>
            <a href="/" class="text-sm font-semibold hover:text-white/80 transition-colors uppercase tracking-wider">Back to Shop</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16 md:py-24">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            
            <div class="space-y-8">
                <div>
                    <h1 class="text-4xl md:text-5xl font-black mb-4">Let's Connect</h1>
                    <p class="text-[#737874] text-lg">Have a question about an order or just want to say hi? We're here for you.</p>
                </div>

                <div class="space-y-6">
                    <div class="flex gap-4">
                        <div class="bg-primary/10 p-3 rounded-lg h-fit">
                            <span class="material-symbols-outlined text-primary">mail</span>
                        </div>
                        <div>
                            <h4 class="font-bold">Email Us</h4>
                            <p class="text-[#737874]">hello@easypick.com</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="bg-primary/10 p-3 rounded-lg h-fit">
                            <span class="material-symbols-outlined text-primary">location_on</span>
                        </div>
                        <div>
                            <h4 class="font-bold">Our Studio</h4>
                            <p class="text-[#737874]">123 Minimalist Avenue, Creative Quarter<br/>New York, NY 10012</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-gray-100">
                <form action="#" method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-[#141514]">Full Name</label>
                            <input type="text" class="w-full rounded-lg border-gray-200 focus:border-primary focus:ring-primary" placeholder="John Doe">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-[#141514]">Email Address</label>
                            <input type="email" class="w-full rounded-lg border-gray-200 focus:border-primary focus:ring-primary" placeholder="john@example.com">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-[#141514]">Subject</label>
                        <select class="w-full rounded-lg border-gray-200 focus:border-primary focus:ring-primary">
                            <option>General Inquiry</option>
                            <option>Order Support</option>
                            <option>Press & Media</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-[#141514]">Message</label>
                        <textarea rows="4" class="w-full rounded-lg border-gray-200 focus:border-primary focus:ring-primary" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-lg hover:bg-primary/90 transition-all">
                        Send Message
                    </button>
                </form>
            </div>

        </div>
    </main>
</body>
</html>
