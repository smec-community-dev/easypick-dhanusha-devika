<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EasyPick | Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#596059",
                    "surface-tint": "#516355",
                    "on-primary-container": "#c1d5c3",
                    "on-tertiary-fixed": "#2b1519",
                    "surface": "#f8f9fb",
                    "on-tertiary-fixed-variant": "#5b4043",
                    "primary-fixed-dim": "#b8ccba",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e7e8ea",
                    "surface-container": "#edeef0",
                    "primary-fixed": "#d3e8d6",
                    "tertiary-fixed": "#ffd9de",
                    "on-tertiary-container": "#ecc6ca",
                    "inverse-surface": "#2e3132",
                    "surface-container-low": "#f3f4f6",
                    "secondary-container": "#dae2d9",
                    "on-surface": "#191c1e",
                    "on-primary-fixed-variant": "#394b3e",
                    "on-secondary-fixed-variant": "#414942",
                    "on-error": "#ffffff",
                    "outline-variant": "#c3c8c1",
                    "on-secondary-container": "#5d645e",
                    "background": "#f8f9fb",
                    "surface-container-highest": "#e1e2e4",
                    "surface-dim": "#d9dadc",
                    "tertiary-container": "#6e5155",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#b8ccba",
                    "outline": "#737873",
                    "surface-bright": "#f8f9fb",
                    "primary": "#344538",
                    "primary-container": "#4b5d4f",
                    "secondary-fixed": "#dde4dc",
                    "tertiary": "#553a3e",
                    "on-primary-fixed": "#0e1f14",
                    "on-secondary-fixed": "#161d18",
                    "on-background": "#191c1e",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#c1c8c0",
                    "on-surface-variant": "#434843",
                    "inverse-on-surface": "#f0f1f3",
                    "surface-variant": "#e1e2e4",
                    "tertiary-fixed-dim": "#e3bdc2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .ambient-shadow {
            box-shadow: 0 32px 64px -12px rgba(25, 28, 30, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#344538] backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-2 transition-opacity hover:opacity-80 cursor-pointer">
<span class="material-symbols-outlined text-white">arrow_back</span>
<span class="text-xl font-bold tracking-tight text-white font-['Inter']">EasyPick</span>
</div>
{% comment %} <div class="flex items-center gap-6">
<a class="text-[#516355] text-sm font-semibold tracking-[-0.02em] hover:opacity-80 transition-opacity" href="#">Register</a>
</div> {% endcomment %}
</header>
<!-- Main Content: The Atelier Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<!-- Asymmetric Background Decorative Elements -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-primary-fixed opacity-20 blur-3xl rounded-full -z-10"></div>
<div class="fixed bottom-1/4 -right-20 w-96 h-96 bg-secondary-container opacity-30 blur-3xl rounded-full -z-10"></div>
<!-- Reset Password Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl ambient-shadow p-10 relative overflow-hidden">
<!-- Subtle Texture Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>
<div class="flex flex-col items-center text-center">
<!-- Icon Header -->
<div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="text-2xl font-bold tracking-[-0.02em] text-on-surface mb-2">Forgot Password</h1>
<p class="text-on-surface-variant text-sm leading-relaxed mb-8 max-w-[280px]">
                    Enter your username to receive a password reset OTP
                </p>
<!-- Form -->
<form method="POST" action="{% url 'forgot_password' %}">
                    {% csrf_token %}
                    
                    <div class="text-left">
<label class="block text-[10px] uppercase tracking-[0.05em] font-bold text-secondary mb-2 ml-1" for="username">Username</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-lg py-3.5 px-4 text-on-surface placeholder:text-outline-variant focus:ring-0 transition-all" id="username" name="username" placeholder="Enter Username" type="text"/>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-primary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Error Message Placeholder -->
<div class="min-h-[1.25rem]">
                        {% if error %}
                        <p class="text-error text-xs font-medium flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">error</span>
                            {{ error }}
                        </p>
                        {% endif %}
                    </div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-semibold py-4 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] duration-200 shadow-sm" type="submit">
<span>Send OTP</span>
<span class="material-symbols-outlined text-lg" data-icon="send">send</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8">
<a class="text-sm font-medium text-primary hover:text-primary-container transition-colors flex items-center gap-1 group" href="href="{% url 'login' %}"">
<span class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform">chevron_left</span>
                        Back to Login
                    </a>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-8 mt-auto bg-[#344538] flex flex-col md:flex-row items-center justify-between px-8 gap-4">
<p class="text-[10px] uppercase tracking-[0.05em] font-medium text-white">
<div class="flex gap-6">
<a class="text-[10px] uppercase tracking-[0.05em] font-medium text-white hover:opacity-80 transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-[0.05em] font-medium text-white hover:opacity-80 transition-colors" href="#">Terms of Service</a>
<a class="text-[10px] uppercase tracking-[0.05em] font-medium text-white hover:opacity-80 transition-colors" href="#">Support</a>
</div>
</footer>
</body></html>
