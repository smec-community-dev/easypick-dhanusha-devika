

{% extends 'seller/base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}
<a href="{% url 'product_list' %}"
           class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-slate-100">

            <span class="material-symbols-outlined text-primary">
                arrow_back
            </span>

        </a>
<main class="flex-1 p-6 bg-[#f4f6f3]">
<form method="POST" enctype="multipart/form-data" class="max-w-5xl mx-auto space-y-6">
{% csrf_token %}

<!-- HEADER -->
<div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-primary">Edit Product</h2>
    <button type="submit"
        class="bg-primary text-white px-6 py-2 rounded-lg font-medium 
        hover:bg-primary/90 shadow-md hover:shadow-lg transition">
        Save Changes
    </button>
</div>

<!-- PRODUCT INFO -->
<div class="bg-white p-6 rounded-xl shadow-md border border-slate-100">
<h3 class="text-lg font-bold mb-4 text-primary">Product Information</h3>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<!-- Name -->
<div class="col-span-2">
<label class="text-sm font-medium text-slate-600">Product Name</label>
<input name="name" value="{{ product.name }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>
<div>
<label class="text-sm font-medium text-slate-600">Category</label>

<select id="category" class="w-full mt-1 p-3 border rounded-lg">

<option value="">Select Category</option>

{% for cat in categories %}
<option value="{{ cat.id }}"
{% if product.subcategory.category.id == cat.id %}selected{% endif %}>
{{ cat.category_name }}
</option>
{% endfor %}

</select>
</div>

<select name="subcategory" id="subcategory"
class="w-full mt-1 p-3 border rounded-lg">

<option value="">Select Subcategory</option>

{% for sub in subcategories %}
<option value="{{ sub.id }}"
{% if product.subcategory.id == sub.id %}selected{% endif %}>
{{ sub.subcategory_name }}
</option>
{% endfor %}

</select>

<!-- Brand -->
<div>
<label class="text-sm font-medium text-slate-600">Brand</label>
<input name="brand" value="{{ product.brand }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

<!-- Model -->
<div>
<label class="text-sm font-medium text-slate-600">Model Number</label>
<input name="model_number" value="{{ product.model_number }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

<!-- Description -->
<div class="col-span-2">
<label class="text-sm font-medium text-slate-600">Description</label>
<textarea name="description" rows="4"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">{{ product.description }}</textarea>
</div>

</div>
</div>

<!-- MEDIA -->
<div class="bg-white p-6 rounded-xl shadow-md border border-slate-100">
<h3 class="text-lg font-bold mb-4 text-primary">Product Images</h3>

<div class="grid grid-cols-4 gap-3">

{% for image in variant.images.all %}
<div class="relative">
<img src="{{ image.image.url }}" 
class="rounded-lg w-full h-24 object-cover border border-slate-200 shadow-sm">

<button type="button"
class="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full">
<span class="material-symbols-outlined text-xs">delete</span>
</button>
</div>
{% endfor %}

<label class="flex items-center justify-center border-2 border-dashed border-slate-300 
bg-slate-50 rounded-lg h-24 cursor-pointer hover:bg-slate-100 transition">
<span class="material-symbols-outlined text-slate-400">add</span>
<input type="file" name="image" class="hidden">
</label>

</div>
</div>

<!-- INVENTORY -->
<div class="bg-white p-6 rounded-xl shadow-md border border-slate-100">
<h3 class="text-lg font-bold mb-4 text-primary">Inventory</h3>

<div class="grid grid-cols-2 gap-4">

<div>
<label class="text-sm font-medium text-slate-600">SKU Code</label>
<input type="text" value="{{ variant.sku_code }}" readonly
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

<div>
<label class="text-sm font-medium text-slate-600">Stock Quantity</label>
<input name="stock_quantity" value="{{ variant.stock_quantity }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

</div>
</div>

<!-- PRICING -->
<div class="bg-white p-6 rounded-xl shadow-md border border-slate-100">
<h3 class="text-lg font-bold mb-4 text-primary">Pricing</h3>

<div class="grid grid-cols-3 gap-4">

<div>
<label class="text-sm font-medium text-slate-600">MRP</label>
<input name="mrp" value="{{ variant.mrp }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

<div>
<label class="text-sm font-medium text-slate-600">Selling Price</label>
<input name="selling_price" value="{{ variant.selling_price }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

<div>
<label class="text-sm font-medium text-slate-600">Cost Price</label>
<input name="cost_price" value="{{ variant.cost_price }}"
class="w-full mt-1 p-3 bg-white border border-slate-200 rounded-lg 
focus:ring-2 focus:ring-primary focus:border-primary 
hover:border-primary/40 outline-none shadow-sm transition">
</div>

</div>
</div>
<!-- SHIPPING -->
<div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
<h3 class="text-lg font-semibold mb-4 text-slate-800">Shipping Details</h3>

<!-- Weight -->
<div class="mb-4">
<label class="block text-sm font-medium text-slate-700 mb-1">
    Weight (kg)
</label>
<input 
    name="weight" 
    value="{{ variant.weight }}" 
    placeholder="Enter weight"
    class="w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-primary outline-none">
</div>

<!-- Dimensions -->
<h4 class="text-sm font-semibold text-slate-600 mb-2">Dimensions (cm)</h4>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<!-- Length -->
<div>
<label class="block text-xs font-medium text-slate-600 mb-1">Length</label>
<input 
    name="length" 
    value="{{ variant.length }}" 
    placeholder="Length"
    class="w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-primary">
</div>

<!-- Width -->
<div>
<label class="block text-xs font-medium text-slate-600 mb-1">Width</label>
<input 
    name="width" 
    value="{{ variant.width }}" 
    placeholder="Width"
    class="w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-primary">
</div>

<!-- Height -->
<div>
<label class="block text-xs font-medium text-slate-600 mb-1">Height</label>
<input 
    name="height" 
    value="{{ variant.height }}" 
    placeholder="Height"
    class="w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-primary">
</div>

</div>

</div>
</div>

</form>
</main>
<script>
document.getElementById("category").addEventListener("change", function(){

    let categoryId = this.value;

    fetch("{% url 'load_subcategories' %}?category_id=" + categoryId)
    .then(response => response.json())
    .then(data => {

        let subDropdown = document.getElementById("subcategory");

        subDropdown.innerHTML = '<option value="">Select Subcategory</option>';

        data.forEach(function(sub){
            let option = document.createElement("option");
            option.value = sub.id;
            option.textContent = sub.subcategory_name;
            subDropdown.appendChild(option);
        });

    });

});
</script>
{% endblock %}
