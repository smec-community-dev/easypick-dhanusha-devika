 <!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EasyPick Seller Discounts</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b5d4f",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-primary/10">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">EasyPick Discounts</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-10 cursor-pointer items-center justify-center rounded-xl bg-primary text-white transition-colors hover:bg-primary/90">
<span class="material-symbols-outlined text-2xl">add</span>
</button>
</div>
</header>
<!-- Search Bar -->
<div class="px-4 py-4">
<label class="flex flex-col min-w-40 h-12 w-full">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full border border-primary/20 bg-white dark:bg-slate-800 shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary">
<div class="text-primary/60 flex items-center justify-center pl-4">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-4 pl-2 text-base font-normal leading-normal" placeholder="Search products or offers" value=""/>
</div>
</label>
</div>
<!-- Filters -->
<div class="flex gap-3 px-4 pb-4 overflow-x-auto no-scrollbar">
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary px-6">
<p class="text-white text-sm font-semibold">All</p>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 dark:bg-primary/20 px-6 border border-primary/20">
<p class="text-primary dark:text-primary text-sm font-medium">Active</p>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 dark:bg-primary/20 px-6 border border-primary/20">
<p class="text-primary dark:text-primary text-sm font-medium">Expired</p>
</button>
</div>
<!-- Discount List -->
<main class="flex-1 px-4 space-y-3 pb-24">
<!-- Item 1: Active -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/10 shadow-sm">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-20 shrink-0 bg-slate-200" data-alt="Jar of raw organic golden honey" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBlnC3TdL9a2l_4zMQzGgn-Cp7E6X_plgdZjyeJ1na6BarQj_IiPziLV1sPnsS1NRANA7gNCq35Pq4mByFChF9rOPsp8ulYregwmnHrOrRBZeMzMHaK3dE4YgwNR5IYb-xWxd_yKNw_nxwgDkkQUmJrgrkIo5xYHAg7FfHYFEEz4BupX_N8pNJXzjgUbKljred_hUwpQLW4oVvgAd7e_ot3-OBw4McwhPNnTh1MA5rCcXERIEm9XNhPocI31G_T6tLo3cH1l0lPUEs");'></div>
<div class="flex flex-1 flex-col justify-center min-w-0">
<div class="flex justify-between items-start">

{% for discount in discounts %}

<div class="flex items-center gap-4 bg-white p-3 rounded-xl">

<p class="font-bold">
{{ discount.variant.product.name }}
</p>

<p class="text-primary">
{{ discount.discount_percent }}% OFF
</p>

<p>
{{ discount.start_date }} - {{ discount.end_date }}
</p>

</div>

{% endfor %}




</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-20 max-w-md mx-auto flex gap-2 border-t border-primary/10 bg-white/95 dark:bg-background-dark/95 backdrop-blur-md px-4 pb-4 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">inventory_2</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Products</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">confirmation_number</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Discounts</p>
<div class="w-1 h-1 rounded-full bg-primary mt-0.5"></div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Profile</p>
</a>
</nav>
</div>
</body></html>
